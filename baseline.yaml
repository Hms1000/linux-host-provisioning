---
- name: Linux Provisioning Baseline
  hosts: all
  become: true
  vars_files:
    - vars.yaml

  tasks:
    - name: Update and upgrade apt packages
      apt:
        update_cache: yes
        upgrade: dist

    - name: Set up hostname
      hostname:
        name: my-linux-host

    - name: Set up timezone
      timezone:
        name: UTC

    - name: Install SSH server
      apt:
        name: ssh
        state: present

    - name: Create admin user
      user:
        name: "{{ admin_user }}"
        comment: "Admin User"
        shell: /bin/bash
        groups: sudo
        create_home: yes

    - name: Set up SSH key for admin user
      authorized_key:
        user: "{{ admin_user }}"
        state: present
        key: "{{ ssh_public_key }}"
      notify: Restart SSH service

    - name: Enable and start SSH service
      service:
        name: ssh
        state: started
        enabled: yes
      notify: Restart SSH service

    - name: Disable root login via SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        backup: yes
      notify: Restart SSH service

    - name: Disable password authentication for SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        backup: yes
      notify: Restart SSH service

    - name: Change SSH to a non-standard port
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Port'
        line: 'Port 2222'
        backup: yes
      notify: Restart SSH service

    - name: Install UFW firewall
      apt:
        name: ufw
        state: present

    - name: Allow SSH through UFW
      ufw:
        rule: allow
        port: 2222
        proto: tcp

    - name: Set UFW default incoming policy
      ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Set UFW default outgoing policy
      ufw:
        state: enabled
        policy: allow
        direction: outgoing

    - name: Install Common Administration Tools
      apt:
        name:
          - htop
          - curl
          - wget
          - git
        state: present

    - name: Install Fail2Ban
      apt:
        name: fail2ban
        state: present

    - name: Enable and start Fail2Ban service
      service:
        name: fail2ban
        state: started
        enabled: yes
    
    - name: validate SSH configuration
      command: sshd -t
      
  handlers:
    - name: Restart SSH service
      service:
        name: ssh
        state: restarted

  